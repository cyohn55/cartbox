<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEON CITY — Cartbox Pro player</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0a0812; color: #eae6ff; font-family: ui-monospace, SFMono-Regular, monospace; }
    main { max-width: 960px; margin: 0 auto; padding: 28px 20px 60px; }
    h1 { font-size: 20px; margin: 0 0 4px; letter-spacing: 1px; }
    .sub { color: #a89fce; font-size: 13px; margin: 0 0 20px; }
    #stage { width: 100%; aspect-ratio: 640 / 360; background: #06050c;
             border: 1px solid #362f52; border-radius: 10px; overflow: hidden; }
    .row { display: flex; gap: 8px; margin: 14px 0; }
    button { font: inherit; padding: 7px 13px; border-radius: 8px; border: 1px solid #4a4270;
             background: #241f38; color: #eae6ff; cursor: pointer; }
    button:hover { background: #2f2949; }
    #log { color: #a89fce; font-size: 12px; white-space: pre-wrap; min-height: 1.2em; }
    kbd { background:#241f38; border:1px solid #4a4270; border-radius:4px; padding:1px 5px; font-size:11px; }
  </style>
</head>
<body>
  <main>
    <h1>NEON&nbsp;CITY</h1>
    <p class="sub">Running on the Cartbox <b>Pro</b> core — 640×360 · 256 colours. Parallax skyline,
      emissive neon, wet-street light pools, and a screen-space puddle reflection, all computed in-cart.
      Hold <kbd>◀</kbd>/<kbd>▶</kbd> to steer the scroll.</p>
    <div id="stage"></div>
    <div class="row">
      <button id="play">▶ Play</button>
      <button id="pause">⏸ Pause</button>
    </div>
    <p id="log">Loading…</p>
  </main>

  <script type="module">
    const log = (m) => (document.getElementById("log").textContent = m);
    const { mount } = await import("../dist/index.js");

    const player = mount(document.getElementById("stage"), {
      cartUrl: "./neon-city.tic",
      modelId: "pro",
      engineUrl: "../../engine/dist/pro/engine.js",
      scale: "fit",
      autostart: true,
      onReady: () => log("Ready — NEON CITY running on the Pro core (640×360 · 256 colours)."),
      onError: (e) => log("Error: " + e.message),
    });

    document.getElementById("play").onclick = () => player.resume();
    document.getElementById("pause").onclick = () => player.pause();
  </script>
</body>
</html>
