# Builds the static "demo" export of the web app (no server: carts come from
# the baked-in catalog, saves land in localStorage) and publishes it to GitHub
# Pages at https://<owner>.github.io/<repo>/.
name: Deploy static demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # R2 credentials for publishing the game bundles (step 2 of the hosting
    # migration — see apps/web/DEPLOY-VERCEL.md). Sourced from repo secrets; when
    # unset, the R2 upload step below is skipped, so this workflow still works for
    # a Pages-only deploy.
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      # Ported titles whose artefacts are too large to commit are rebuilt here
      # instead: the Doom payload (~27MB game.data) and its wasm are gitignored
      # and fully reproducible, so the deploy fetches the Freedoom IWAD and
      # compiles the engine. Without this the Browse tab would list a Doom card
      # that 404s on the live site. Emscripten is pinned to the version the
      # build was authored against.
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2
          actions-cache-folder: emsdk-cache

      - name: Fetch Freedoom assets
        run: node scripts/fetch-freedoom.mjs

      - name: Build Doom (WebAssembly)
        run: node scripts/build-doom.mjs

      # Chex Quest reuses the Doom engine with its own IWAD (build-doom.mjs chex),
      # so it is fetched and built here alongside Doom rather than committed.
      - name: Fetch Chex Quest assets
        run: node scripts/fetch-chex.mjs

      - name: Build Chex Quest (WebAssembly)
        run: node scripts/build-doom.mjs chex

      # The ScummVM engine (scummvm.js/wasm + data/) and the Beneath a Steel Sky
      # freeware data are large and reproducible, so — like Doom — they are built
      # here rather than committed. ScummVM's own build downloads its pinned emsdk
      # (4.0.10), so this does not reuse the Emscripten set up above. The compile
      # is slow, so the engine output is cached and only rebuilt when the build or
      # fetch script changes.
      - name: Cache ScummVM engine
        id: scummvm-cache
        uses: actions/cache@v4
        with:
          path: apps/web/public/scummvm
          # The cached directory also holds the committed loader, so key on it too:
          # editing the loader must not be masked by a stale cached copy.
          key: scummvm-${{ hashFiles('scripts/build-scummvm.mjs', 'scripts/fetch-scummvm-games.mjs', 'apps/web/public/scummvm/cartbox-boot.html') }}

      - name: Build ScummVM engine + fetch game data
        if: steps.scummvm-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y pkg-config zip
          node scripts/build-scummvm.mjs
          node scripts/fetch-scummvm-games.mjs

      # SuperTux (SDL3 + vcpkg) is the third iframe-hosted engine. Its engine
      # (supertux2.js/wasm) and preloaded asset package (supertux2.data ~170MB,
      # over GitHub's file limit) are gitignored and reproducible, so — like Doom
      # and ScummVM — they are built here. The build is slow (vcpkg compiles SDL3
      # and friends for wasm), so the output is cached and only rebuilt when the
      # build script or loader changes.
      - name: Cache SuperTux engine
        id: supertux-cache
        uses: actions/cache@v4
        with:
          path: apps/web/public/supertux
          key: supertux-${{ hashFiles('scripts/build-supertux.mjs', 'apps/web/public/supertux/cartbox-boot.html') }}

      # SuperTux needs the sdl3 + sdl3_ttf emscripten ports, which the 6.0.2 used
      # for Doom lacks; 6.0.3 has them. Doom is already built above, so switching
      # the active emsdk now is safe.
      - name: Set up Emscripten for SuperTux
        if: steps.supertux-cache.outputs.cache-hit != 'true'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.3
          actions-cache-folder: emsdk-cache-supertux

      - name: Build SuperTux (WebAssembly)
        if: steps.supertux-cache.outputs.cache-hit != 'true'
        # GitHub-hosted runners ship a bootstrapped vcpkg at $VCPKG_INSTALLATION_ROOT
        # (a runner env var, not in the ${{ env }} context), so export it in the
        # shell. build-supertux.mjs reads EMSDK, set by setup-emsdk above.
        run: |
          sudo apt-get update && sudo apt-get install -y ninja-build pkg-config zip unzip
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          node scripts/build-supertux.mjs
        env:
          NPROC: 4

      # DOS runtime: unlike the other ported titles this compiles nothing — the
      # js-dos/DOSBox engine and the C-Dogs game are vendored under games/cdogs and
      # this step just copies them into public/, verifying pinned digests. Without
      # it the Browse tab would list a C-Dogs card that 404s on the live site.
      - name: Assemble DOS runtime (js-dos + C-Dogs)
        run: node scripts/fetch-dosbox.mjs

      # Quake (WebQuake) and Cube 2 (BananaBread) compile nothing — pure-JS /
      # vendored-WASM engines — so they just fetch/assemble here (no Emscripten).
      # fetch-quake downloads the freely redistributable shareware pak0; fetch-cube2
      # copies the vendored BananaBread bundle. Without these the Browse tab lists
      # Quake/Cube 2 cards that 404 on the live site.
      - name: Assemble Quake runtime (WebQuake + shareware pak0)
        run: node scripts/fetch-quake.mjs

      - name: Assemble Cube 2 runtime (BananaBread)
        run: node scripts/fetch-cube2.mjs

      # Step 2 of the hosting migration: push the built bundles to Cloudflare R2 so
      # the Vercel deployment can serve them (next.config.mjs rewrites the same-origin
      # bundle paths to GAME_CDN_URL). Skipped when the R2_* secrets are absent, so a
      # Pages-only deploy is unaffected.
      - name: Publish game bundles to R2
        if: ${{ env.R2_ENDPOINT != '' }}
        run: node scripts/publish-bundles-r2.mjs

      - name: Build static export
        run: npm run build:static --workspace apps/web
        env:
          # Pages project sites are served under /<repo>.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
