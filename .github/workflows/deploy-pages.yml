# Builds the static "demo" export of the web app (no server: carts come from
# the baked-in catalog, saves land in localStorage) and publishes it to GitHub
# Pages at https://<owner>.github.io/<repo>/.
name: Deploy static demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      # Ported titles whose artefacts are too large to commit are rebuilt here
      # instead: the Doom payload (~27MB game.data) and its wasm are gitignored
      # and fully reproducible, so the deploy fetches the Freedoom IWAD and
      # compiles the engine. Without this the Browse tab would list a Doom card
      # that 404s on the live site. Emscripten is pinned to the version the
      # build was authored against.
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2
          actions-cache-folder: emsdk-cache

      - name: Fetch Freedoom assets
        run: node scripts/fetch-freedoom.mjs

      - name: Build Doom (WebAssembly)
        run: node scripts/build-doom.mjs

      - name: Build static export
        run: npm run build:static --workspace apps/web
        env:
          # Pages project sites are served under /<repo>.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
